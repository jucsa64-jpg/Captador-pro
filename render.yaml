services:
  - type: web
    name: captadorpro
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: TU_ZONA
        value: Garraf
      - key: AUTONOMO_NOMBRE
        value: Pablo
